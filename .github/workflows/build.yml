name: Build APK with Tox (prebuilt)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt libtoxcore
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64
          wget -O android/app/src/main/jniLibs/arm64-v8a/libtoxcore.so https://github.com/zoff99/ToxAndroidRefImpl/releases/download/v0.2.19/libtoxcore-android-arm64-v8a.so
          wget -O android/app/src/main/jniLibs/armeabi-v7a/libtoxcore.so https://github.com/zoff99/ToxAndroidRefImpl/releases/download/v0.2.19/libtoxcore-android-armeabi-v7a.so
          wget -O android/app/src/main/jniLibs/x86_64/libtoxcore.so https://github.com/zoff99/ToxAndroidRefImpl/releases/download/v0.2.19/libtoxcore-android-x86_64.so

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: p2p-chat-tox-apk
          path: build/app/outputs/flutter-apk/app-release.apk

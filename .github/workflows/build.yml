name: Build APK with Tox (from source)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Checkout c-toxcore
        uses: actions/checkout@v4
        with:
          repository: TokTok/c-toxcore
          path: c-toxcore
          ref: v0.2.19   # Versão estável

      - name: Build libtoxcore for Android
        run: |
          cd c-toxcore
          mkdir build_android
          cd build_android
          # Define as toolchains para cada ABI
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_SHARED=ON \
            -DBUILD_TOXAV=OFF \
            -DBUILD_TESTING=OFF
          cmake --build . --target toxcore -- -j$(nproc)
          mkdir -p ../../android/app/src/main/jniLibs/arm64-v8a
          cp lib/libtoxcore.so ../../android/app/src/main/jniLibs/arm64-v8a/libtoxcore.so

          # Repete para armeabi-v7a
          cd ..
          rm -rf build_android
          mkdir build_android && cd build_android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_SHARED=ON \
            -DBUILD_TOXAV=OFF \
            -DBUILD_TESTING=OFF
          cmake --build . --target toxcore -- -j$(nproc)
          mkdir -p ../../android/app/src/main/jniLibs/armeabi-v7a
          cp lib/libtoxcore.so ../../android/app/src/main/jniLibs/armeabi-v7a/libtoxcore.so

          # Repete para x86_64
          cd ..
          rm -rf build_android
          mkdir build_android && cd build_android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_SHARED=ON \
            -DBUILD_TOXAV=OFF \
            -DBUILD_TESTING=OFF
          cmake --build . --target toxcore -- -j$(nproc)
          mkdir -p ../../android/app/src/main/jniLibs/x86_64
          cp lib/libtoxcore.so ../../android/app/src/main/jniLibs/x86_64/libtoxcore.so

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: p2p-chat-tox-apk
          path: build/app/outputs/flutter-apk/app-release.apk

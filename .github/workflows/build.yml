name: Build APK with Tox

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # Guardar as permissões da câmara/internet antes de apagar a pasta android
      - name: Backup AndroidManifest
        run: cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml || true

      # Apagar a pasta android (vai ser recriada de seguida)
      - name: Remove old android folder
        run: rm -rf android

      # Escrever o pubspec.yaml correto (nome p2p_chat) e guardar uma cópia
      - name: Write correct pubspec.yaml
        run: |
          cat > pubspec.yaml << 'EOF'
          name: p2p_chat
          description: Chat P2P seguro com Tox
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            qr_flutter: ^4.1.0
            mobile_scanner: ^3.5.7
            google_fonts: ^6.1.0
            flutter_animate: ^4.2.0
            shared_preferences: ^2.2.2
            sqflite: ^2.3.0
            cryptography: ^2.7.0
            path_provider: ^2.1.2
            ffi: ^2.1.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
          flutter:
            uses-material-design: true
          EOF
          cp pubspec.yaml /tmp/pubspec.yaml

      # Recriar a plataforma Android com o nome forçado
      - name: Regenerate Android platform
        run: flutter create --project-name p2p_chat --platforms android .

      # Restaurar o nosso pubspec (com dependências completas)
      - name: Restore pubspec.yaml
        run: cp -f /tmp/pubspec.yaml pubspec.yaml

      # Restaurar as permissões da câmara e internet
      - name: Restore AndroidManifest
        run: cp -f /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      # Forçar a versão correta do NDK
      - name: Set correct NDK version
        run: sed -i 's|ndkVersion = flutter.ndkVersion|ndkVersion = "27.0.12077973"|' android/app/build.gradle.kts

      # Descarregar as bibliotecas oficiais do Tox
      - name: Download Tox native libraries
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64
          wget -q https://github.com/TokTok/c-toxcore/releases/download/v0.2.23/toxcore-v0.2.23-android-arm64-v8a.tar.gz
          tar -xzf toxcore-v0.2.23-android-arm64-v8a.tar.gz -C android/app/src/main/jniLibs/arm64-v8a --strip-components=1
          wget -q https://github.com/TokTok/c-toxcore/releases/download/v0.2.23/toxcore-v0.2.23-android-armeabi-v7a.tar.gz
          tar -xzf toxcore-v0.2.23-android-armeabi-v7a.tar.gz -C android/app/src/main/jniLibs/armeabi-v7a --strip-components=1
          wget -q https://github.com/TokTok/c-toxcore/releases/download/v0.2.23/toxcore-v0.2.23-android-x86_64.tar.gz
          tar -xzf toxcore-v0.2.23-android-x86_64.tar.gz -C android/app/src/main/jniLibs/x86_64 --strip-components=1

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: p2p-chat-tox-apk
          path: build/app/outputs/flutter-apk/app-release.apk

name: Build APK with Tox (official binaries)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download official Tox binaries from TokTok v0.2.23
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64
          # Tenta os links diretos (padrão de releases anteriores)
          wget -q -O android/app/src/main/jniLibs/arm64-v8a/libtoxcore.so \
            https://github.com/TokTok/c-toxcore/releases/download/v0.2.23/libtoxcore-android-arm64-v8a.so
          wget -q -O android/app/src/main/jniLibs/armeabi-v7a/libtoxcore.so \
            https://github.com/TokTok/c-toxcore/releases/download/v0.2.23/libtoxcore-android-armeabi-v7a.so
          wget -q -O android/app/src/main/jniLibs/x86_64/libtoxcore.so \
            https://github.com/TokTok/c-toxcore/releases/download/v0.2.23/libtoxcore-android-x86_64.so
          # Se falhar, tenta como tar.gz extraído (fallback)
          if [ ! -f android/app/src/main/jniLibs/arm64-v8a/libtoxcore.so ]; then
            wget -q -O toxlibs.tar.gz https://github.com/TokTok/c-toxcore/releases/download/v0.2.23/libtoxcore-android-v0.2.23.tar.gz
            tar -xzf toxlibs.tar.gz -C android/app/src/main/jniLibs/
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: p2p-chat-tox-apk
          path: build/app/outputs/flutter-apk/app-release.apk

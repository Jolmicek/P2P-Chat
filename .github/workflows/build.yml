name: Build APK with Tox (final)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      # Escrever pubspec.yaml atualizado para evitar conflitos de kotlin JDK antigo
      - name: Write correct pubspec.yaml and remove old .metadata
        run: |
          cat > pubspec.yaml << 'EOF'
          name: p2p_chat
          description: Chat P2P seguro com Tox
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            qr_flutter: ^4.2.0
            mobile_scanner: ^5.2.3
            google_fonts: ^6.2.1
            flutter_animate: ^4.5.0
            shared_preferences: ^2.3.2
            sqflite: ^2.4.0
            cryptography: ^2.7.0
            path_provider: ^2.1.4
            ffi: ^2.1.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
          flutter:
            uses-material-design: true
          EOF
          rm -f .metadata
        shell: bash

      # Backup do AndroidManifest (permissões)
      - name: Backup AndroidManifest
        run: cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml || true
        shell: bash

      # Remover pasta android existente
      - name: Remove old android folder
        run: rm -rf android
        shell: bash

      # Recriar a plataforma Android forçando o nome p2p_chat
      - name: Regenerate Android platform
        run: flutter create --project-name p2p_chat --platforms android .
        shell: bash

      # Restaurar o AndroidManifest com permissões
      - name: Restore AndroidManifest
        run: cp -f /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
        shell: bash

      # Corrigir NDK
      - name: Set correct NDK version
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's|ndkVersion = flutter.ndkVersion|ndkVersion = "27.0.12077973"|' android/app/build.gradle.kts
          fi
        shell: bash

      # Limpar cache do Gradle
      - name: Clear Gradle cache
        run: rm -rf /home/runner/.gradle/caches/
        shell: bash

      # Forçar Kotlin 1.9.22 no settings.gradle.kts gerado
      - name: Force Kotlin version
        run: |
          if [ -f android/settings.gradle.kts ]; then
            sed -i 's/id("org.jetbrains.kotlin.android") version "[^"]*"/id("org.jetbrains.kotlin.android") version "1.9.22"/' android/settings.gradle.kts
          fi
        shell: bash

      # Solução definitiva para ignorar e excluir os modulos stdlib antigos do jdk7/jdk8
      - name: Fix Kotlin stdlib duplication conflicts in build.gradle.kts
        run: |
          cat >> android/app/build.gradle.kts << 'EOF'

          configurations.all {
              exclude(group = "org.jetbrains.kotlin", module = "kotlin-stdlib-jdk7")
              exclude(group = "org.jetbrains.kotlin", module = "kotlin-stdlib-jdk8")
              resolutionStrategy.eachDependency {
                  if (requested.group == "org.jetbrains.kotlin") {
                      useVersion("1.9.22")
                  }
              }
          }
          EOF
        shell: bash

      # Descarregar as bibliotecas oficiais do Tox
      - name: Download Tox native libraries
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64
          wget -q https://github.com/TokTok/c-toxcore/releases/download/v0.2.23/toxcore-v0.2.23-android-arm64-v8a.tar.gz
          tar -xzf toxcore-v0.2.23-android-arm64-v8a.tar.gz -C android/app/src/main/jniLibs/arm64-v8a --strip-components=1
          wget -q https://github.com/TokTok/c-toxcore/releases/download/v0.2.23/toxcore-v0.2.23-android-armeabi-v7a.tar.gz
          tar -xzf toxcore-v0.2.23-android-armeabi-v7a.tar.gz -C android/app/src/main/jniLibs/armeabi-v7a --strip-components=1
          wget -q https://github.com/TokTok/c-toxcore/releases/download/v0.2.23/toxcore-v0.2.23-android-x86_64.tar.gz
          tar -xzf toxcore-v0.2.23-android-x86_64.tar.gz -C android/app/src/main/jniLibs/x86_64 --strip-components=1
        shell: bash

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        shell: bash

      - name: Install dependencies
        run: flutter pub get
        shell: bash

      - name: Build APK
        run: flutter build apk --release
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: p2p-chat-tox-apk
          path: build/app/outputs/flutter-apk/app-release.apk
